<!DOCTYPE html>
<html>
<head>
    <title>Exam App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div>Exam Portal</div>
</header>

<!-- TIMER (NEW POSITION) -->
<div id="timerBar">
    <div id="timer">06:00</div>
</div>

<!-- QUIZ PAGE -->
<section id="quizPage">

    <div id="questionNumber"></div>
    <div id="questionContainer"></div>

    <div id="palette"></div>

</section>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <button onclick="prevQuestion()">Prev</button>
    <button onclick="markRevisit()" id="markBtn">Mark</button>
    <button onclick="nextQuestion()">Next</button>
    <button onclick="submitQuiz()">Submit</button>
</div>

<!-- RESULT -->
<section id="resultPage" class="hidden">
    <h2>Result</h2>
    <canvas id="chart"></canvas>
    <h3 id="scoreText"></h3>
    <button onclick="showAnswerKey()">Review Answers</button>
</section>

<!-- ANSWER KEY -->
<section id="answerKeyPage" class="hidden">
    <h2>Answer Review</h2>
    <div id="answerKey"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
